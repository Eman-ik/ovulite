name: deploy-prod

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        run: |
          python -m pytest tests/acceptance/test_acceptance_cases_1_to_4.py -q
          python -m pytest tests/acceptance/test_acceptance_cases_5_to_10.py -q

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend
        run: npm run build
