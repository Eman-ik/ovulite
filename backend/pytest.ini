[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (database, external services)
    regression: Regression tests (model performance gates)
    performance: Performance tests (latency benchmarks)
    acceptance: End-to-end acceptance contract tests
    slow: Tests that take > 5 seconds

# Test discovery patterns
norecursedirs = .git .venv venv __pycache__ *.egg-info

# Coverage settings
[coverage:run]
source = app,ml
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
